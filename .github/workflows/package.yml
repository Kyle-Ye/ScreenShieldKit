name: Package Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - '.github/workflows/package.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - '.github/workflows/package.yml'

jobs:
  test:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: 'SwiftPM / Xcode 16.4 on macOS 15'
            runs_on: macos-15
            xcode_version: '16.4'
            xcode_name: 'Xcode_16.4.app'
            ios_version: '18.5'
            device: 'iPhone 16 Pro'
          - name: 'SwiftPM / Xcode 26.3 on macOS 26'
            runs_on: macos-26
            xcode_version: '26.3'
            xcode_name: 'Xcode_26.3.app'
            ios_version: '26.2'
            device: 'iPhone 17 Pro'
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.config.xcode_version }}

      - name: Prepare Xcode
        run: |
          sudo xcode-select -s "/Applications/${{ matrix.config.xcode_name }}/Contents/Developer"
          swift --version

      - name: Run package unit tests without default traits
        run: swift test --disable-default-traits

      - name: Run OpenSwiftUI trait unit tests
        uses: ./.github/actions/example
        with:
          scheme: ScreenShieldKitPackageTests
          platform: ios
          xcode-version: ${{ matrix.config.xcode_version }}
          xcode-name: ${{ matrix.config.xcode_name }}
          destination: 'platform=iOS Simulator,name=${{ matrix.config.device }},OS=${{ matrix.config.ios_version }}'
