name: UIKit Example Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'Sources/**'
      - 'Example/UIKitExample/**'
      - 'Example/Tests/**'
      - 'Example/UITests/UIKitExampleUITests.swift'
      - 'Example/UITests/UIKitExampleUITests-Bridging-Header.h'
      - 'Example/UITests/ScreenshotAssertions.swift'
      - 'Example/UITests/SimulatorShaker.h'
      - 'Example/UITests/SimulatorShaker.m'
      - 'Example/Project.swift'
      - 'Example/Tuist.swift'
      - 'Example/Tuist/**'
      - 'Example/mise.toml'
      - '.github/actions/example/action.yml'
      - '.github/workflows/example_uikit.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Sources/**'
      - 'Example/UIKitExample/**'
      - 'Example/Tests/**'
      - 'Example/UITests/UIKitExampleUITests.swift'
      - 'Example/UITests/UIKitExampleUITests-Bridging-Header.h'
      - 'Example/UITests/ScreenshotAssertions.swift'
      - 'Example/UITests/SimulatorShaker.h'
      - 'Example/UITests/SimulatorShaker.m'
      - 'Example/Project.swift'
      - 'Example/Tuist.swift'
      - 'Example/Tuist/**'
      - 'Example/mise.toml'
      - '.github/actions/example/action.yml'
      - '.github/workflows/example_uikit.yml'

jobs:
  test:
    name: iOS ${{ matrix.runtime.ios_version }} / Xcode ${{ matrix.runtime.xcode_version }} / ${{ matrix.runtime.runs_on }}
    runs-on: ${{ matrix.runtime.runs_on }}
    env:
      GITHUB_TOKEN: ${{ github.token }}
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - ios_version: '18.5'
            device: 'iPhone 16 Pro'
            runs_on: macos-15
            xcode_version: '16.4'
            xcode_name: 'Xcode_16.4.app'
          - ios_version: '26.2'
            device: 'iPhone 17 Pro'
            runs_on: macos-26
            xcode_version: '26.3'
            xcode_name: 'Xcode_26.3.app'
    steps:
      - uses: actions/checkout@v4

      - name: Run example tests
        uses: ./.github/actions/example
        with:
          scheme: UIKitExample
          platform: ios
          xcode-version: ${{ matrix.runtime.xcode_version }}
          xcode-name: ${{ matrix.runtime.xcode_name }}
          destination: 'platform=iOS Simulator,name=${{ matrix.runtime.device }},OS=${{ matrix.runtime.ios_version }}'
