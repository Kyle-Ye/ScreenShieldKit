name: iOS UI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.runs-on }}
    env:
      GITHUB_TOKEN: ${{ github.token }}
    strategy:
      matrix:
        config:
          - name: 'Xcode 16.4 on macOS 15'
            runs-on: macos-15
            xcode: '16.4'
            xcode_name: 'Xcode_16.4.app'
            destinations: |
              platform=iOS Simulator,name=iPhone 16 Pro,OS=18.5
          - name: 'Xcode 26.3 on macOS 26'
            runs-on: macos-26
            xcode: '26.3'
            xcode_name: 'Xcode_26.3.app'
            destinations: |
              platform=iOS Simulator,name=iPhone 17 Pro,OS=26.2
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.config.xcode }}
      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install tools
        working-directory: Example
        run: |
          mise trust --yes
          mise install
      - name: iOS Tests
        working-directory: Example
        run: |
          sudo xcode-select -s /Applications/${{ matrix.config.xcode_name }}/Contents/Developer
          xcrun simctl list devices
          sudo xcodebuild -runFirstLaunch
          sudo xcodebuild -sdk iphonesimulator -version
          sudo installer -pkg /Applications/${{ matrix.config.xcode_name }}/Contents/Resources/Packages/XcodeSystemResources.pkg -target /
          mise exec -- tuist install
          mise exec -- tuist generate --no-open

          while IFS= read -r destination; do
            [ -z "$destination" ] && continue
            for scheme in UIKitExample SwiftUIExample; do
              echo "Testing $scheme on $destination"
              xcodebuild test \
                -workspace ScreenShieldKitExamples.xcworkspace \
                -scheme "$scheme" \
                -destination "$destination"
            done
          done <<< "${{ matrix.config.destinations }}"
